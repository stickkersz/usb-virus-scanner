# All-Round Virus Scanner — company configuration
# Edit paths to match your deployment. All paths support Windows (C:\...) and POSIX.

scanner:
  # Path to ClamAV's clamscan.exe (or clamdscan.exe for daemon mode).
  # Default assumes the standard Windows installer location.
  clamscan_path: "C:\\Program Files\\ClamAV\\clamscan.exe"
  clamdscan_path: "C:\\Program Files\\ClamAV\\clamdscan.exe"
  # Virus-signature database directory (main.cvd/daily.cvd). Used only if it
  # exists — required for a bundled/portable ClamAV. Ignored otherwise.
  database_path: "C:\\Program Files\\ClamAV\\database"
  # Prefer the resident daemon (clamd) when available — 10-100x faster on repeated scans.
  prefer_daemon: true
  # Max file size to scan (MB). Larger files are skipped (logged).
  max_file_size_mb: 200
  # Follow into archives (zip/rar/7z). ClamAV handles decompression.
  # Turning this OFF is a big speed win on slow laptops (skips unpacking).
  scan_archives: true
  # Worker threads for the heuristic layer. "auto" = scale to CPU cores
  # (kept modest so single-disk laptops don't thrash), then clamp by free RAM
  # so a low-end machine can't fan out into an out-of-memory Full scan. Or set
  # an integer to override.
  workers: auto
  # Run scans at below-normal process priority so a Full scan keeps a weak PC
  # usable instead of pinning every core. Set false on a dedicated scan box.
  background_priority: true
  # Skip files already scanned clean and unchanged since last scan.
  # Massive speed-up when re-scanning the same USB / company hard disk.
  use_cache: true
  # clamdscan --multiscan: use all daemon threads in parallel (multi-core win).
  multiscan: true
  # Detect adware / potentially-unwanted programs (PUP/PUA) via ClamAV.
  detect_pua: true
  # Enable ClamAV's own heuristics (packed/broken PE, macros) for zero-days.
  heuristic_alerts: true
  # Include mapped network drives in a --profile full scan. Off by default:
  # walking a share is slow and scans another machine's files.
  scan_network_drives: false
  # Paths NEVER scanned, by any layer. Empty by default — an exclusion is a
  # hole in coverage, so it is opt-in. Use it for big media/dev trees that
  # make Full scans take hours (the spec's stated purpose).
  #   Absolute path -> that folder and everything under it
  #   Wildcard      -> matches full path or bare filename ("*" spans folders)
  #   Bare name     -> any file/folder with that name, at any depth
  # WARNING: never exclude user-writable drop targets — Downloads, Temp,
  # AppData — those are exactly where malware lands.
  exclusions: []
  #  - "D:\\VMs"                  # multi-GB virtual disk images
  #  - "node_modules"             # dev dependency trees, any depth
  #  - "*.iso"                    # disk images
  #  - "C:\\Users\\*\\AppData\\Local\\Google\\Chrome\\User Data\\*\\Cache"

heuristics:
  enabled: true
  # Flag autorun.inf on removable media — classic USB-worm propagation vector.
  flag_autorun_inf: true
  # Ransomware early-warning: encrypted-file extensions + ransom-note filenames.
  flag_ransomware: true
  # Flag packed/high-entropy executables (obfuscated / novel trojan variants).
  flag_packed_exe: true
  # Extensions treated as high-risk on removable media.
  suspicious_extensions:
    - ".exe"
    - ".scr"
    - ".bat"
    - ".cmd"
    - ".vbs"
    - ".vbe"
    - ".js"
    - ".jse"
    - ".ps1"
    - ".lnk"
    - ".pif"
    - ".com"
    - ".hta"
    - ".jar"
  # Flag double extensions like invoice.pdf.exe
  flag_double_extension: true
  # SHA-256 hash blocklist file (one hash per line, optional "  # comment").
  hash_blocklist: "signatures/hash_blocklist.txt"
  # --- False-positive reducers (legit Windows files can look suspicious) ---
  # Known-GOOD hashes (e.g. from NSRL or your golden image). Files matching are
  # fully trusted: heuristic + YARA layers are skipped for them.
  hash_allowlist: "signatures/allowlist_sha256.txt"
  # Trust a valid Authenticode signature (Windows): suppresses the packed/entropy
  # heuristic on legit signed software (installers etc.). Never hides a real
  # ClamAV / blocklist / YARA detection.
  trust_signed: true
  # Files under these directories skip the entropy heuristic (system software).
  trusted_paths:
    - "C:\\Windows"
    - "C:\\Program Files"
    - "C:\\Program Files (x86)"
  # Directory of YARA rule files (*.yar / *.yara). Empty = disabled.
  yara_rules_dir: "signatures/yara"
  # Fast mode: only read+hash+YARA files that are a risky type OR small.
  # false = fast (recommended for slow laptops). true = hash/YARA every file.
  deep_scan_all: false
  # In fast mode, non-risky files larger than this are not deep-scanned (MB).
  deep_scan_max_mb: 50

quarantine:
  # Where infected files are moved (kept off the removable drive).
  path: "C:\\ProgramData\\AllRounderVirusScanner\\Quarantine"
  # XOR-obfuscate quarantined files so they can't be executed accidentally.
  # NOTE: this neutralizes accidental execution; it is not cryptographic security.
  neutralize: true

logging:
  path: "C:\\ProgramData\\AllRounderVirusScanner\\Logs"
  level: "INFO"
  # Also emit machine-readable JSONL for SIEM ingestion.
  jsonl: true

reporting:
  path: "C:\\ProgramData\\AllRounderVirusScanner\\Reports"

watcher:
  # Auto-scan any removable drive the moment it is inserted.
  auto_scan_on_insert: true
  # Poll interval (seconds) for the fallback drive-letter watcher.
  poll_interval: 3

web:
  # Check where risky downloaded files CAME FROM (Windows Mark-of-the-Web URL)
  # against synced threat-intel feeds. Catches fresh malware whose payload has
  # no signature yet but whose distribution URL is already known-bad.
  # Origin match flags SUSPICIOUS only — origin alone never auto-quarantines
  # (a renamed/re-served file from a bad URL may itself be clean).
  check_download_origin: true
  # Where synced feeds are stored (must be writable by the sync task).
  feeds_dir: "C:\\ProgramData\\AllRounderVirusScanner\\Feeds"
  # Sync with:  arvscan feeds
  # URLhaus by abuse.ch — free for any use, no API key needed.
  feeds:
    - name: urlhaus
      url: "https://urlhaus.abuse.ch/downloads/text_online/"
      type: urls
  # Optional: Google Safe Browsing Lookup API. Register your own API key at
  # console.cloud.google.com (it is NOT bundled). Empty = disabled.
  # PRIVACY: when enabled, download-origin URLs are sent to Google.
  safe_browsing_api_key: ""

realtime:
  # Real-time monitoring (arvscan monitor): scan files the moment they land.
  # Opt-in. Needs the 'watchdog' package (bundled in the installer build).
  enabled: false
  # Directories to watch. Empty = the Quick profile locations (Downloads,
  # Desktop, Temp, AppData, Startup folders) — where new files actually land.
  # Watching whole drives works but costs more; prefer targeted roots.
  paths: []
  #  - "C:\\Users\\Public"
  # Scan a file once it has gone this many seconds without a new write event
  # (a growing download is scanned once at the end, not per chunk).
  settle_seconds: 2.0
  # Quarantine real-time hits automatically. false = report/log only.
  quarantine: true
